<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday!</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #111;
      color: white;
    }

    .container {
      width: 90%;
      max-width: 400px;
      text-align: center;
    }

    h1, h2 {
      margin-bottom: 20px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border: none;
      border-radius: 10px;
      background: #333;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }


    .correct {
      background: #4caf50 !important;
    }

    .wrong {
      background: #e53935 !important;
    }

    .hidden {
      display: none;
    }

    .progress {
      height: 6px;
      background: #333;
      border-radius: 5px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: #4caf50;
      transition: width 0.3s;
    }

    .score {
      margin-bottom: 10px;
      font-size: 14px;
      color: #ccc;
    }

    p {
      color: #ccc;
      line-height: 1.5;
    }
  </style>
</head>
<body>

<div class="container">
  <audio controls>
    <source src = "assets/birthday-music.mp3">
  </audio>
<br> <br>
  <!-- START SCREEN -->
  <div id="startScreen">
    <h1>🎂 Chúc mừng sinh nhật bố mẹ! 🎉</h1>
    <p>
      Nhân dịp sinh nhật bố mẹ con chúc bố mẹ có nhiều sức khỏe và niềm vui<br><br>
      Sau đây là một vài câu hỏi đố vui để thử thách tri thức tuổi mới
    </p>
    <button class="btn" onclick="startQuiz()">Bắt đầu</button>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="quizScreen" class="hidden">
    <div class="score" id="score">Điểm: 0</div>

    <div class="progress">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <h2 id="question">Question</h2>
    <div id="answers"></div>
  </div>

</div>

<script>
const questions = [
  {
    text: "Loại vỏ nào thường dùng để cuốn nem truyền thống miền Bắc?",
    answers: [
      { text: "Bánh tráng", correct: false },
      { text: "Bánh đa nem", correct: true },
      { text: "Vỏ sủi cảo", correct: false },
      { text: "Lá chuối", correct: false },
    ]
  },
  {
    text: "Nguyên liệu nào là đặc trưng trong ẩm thực Việt Nam?",
    answers: [
      { text: "Bơ và sữa", correct: false },
      { text: "Nước mắm", correct: true },
      { text: "Phô mai", correct: false },
      { text: "Bơ đậu phộng", correct: false },
    ]
  },
  {
    text: "Món ăn nào thường xuất hiện trong mâm cỗ ngày Tết ở miền Bắc?",
    answers: [
      { text: "Pizza", correct: false },
      { text: "Sushi", correct: false },
      { text: "Bánh chưng", correct: true },
      { text: "Hamburger", correct: false }
    ]
  },
  {
    text: "Nước mắm có những tác dụng nào trong ẩm thực Việt Nam?",
    answers: [
      { text: "Chỉ dùng để tạo màu cho món ăn", correct: false },
      { text: "Làm tăng hương vị, dùng làm nước chấm và gia vị nấu ăn", correct: true },
      { text: "Chỉ dùng để ướp đồ ngọt", correct: false },
      { text: "Không có vai trò quan trọng", correct: true }
    ]
  },
  {
    text: "Ngày 10 tháng 3 âm lịch là ngày lễ gì?",
    answers: [
      { text: "Tết Đoan ngọ", correct: false },
      { text: "Giỗ tổ Hùng Vương", correct: true },
      { text: "Tết Trung thu", correct: false },
      { text: "Lễ Vu lan", correct: false }
    ]
  },
  {
    text: "Tết Đoan ngọ (diệt sâu bọ) diễn ra vào ngày nào?",
    answers: [
      { text: "1/1 âm lịch", correct: false },
      { text: "3/3 âm lịch", correct: false },
      { text: "5/5 âm lịch", correct: true },
      { text: "15/8 âm lịch", correct: false }
    ]
  },
  {
    text: "Ngày Nhà giáo Việt Nam là ngày nào?",
    answers: [
      { text: "20/10", correct: false },
      { text: "22/12", correct: false },
      { text: "27/2", correct: false },
      { text: "20/11", correct: true }
    ]
  },
  {
    text: "Nếu có cả biển báo cố định và biển báo tạm thời, cần tuân theo biển nào?",
    answers: [
      { text: "Biển tạm thời", correct: true },
      { text: "Biển cố định", correct: false },
      { text: "Biển nào cũng được", correct: false },
      { text: "Tùy tình hình giao thông", correct: false }
    ]
  },
  {
    text: "Người lái xe máy có được dùng điện thoại khi đang chạy xe không?",
    answers: [
      { text: "Được dùng tai nghe", correct: false },
      { text: "Được nếu chạy chậm", correct: false },
      { text: "Tuyệt đối không", correct: true },
      { text: "Chỉ khi có việc gấp", correct: false }
    ]
  },
  {
    text: "Đại học Bách Khoa tổ chức lễ tốt nghiệp vào ngày nào",
    answers: [
      { text: "10/5", correct: true },
      { text: "8/5", correct: false },
      { text: "9/5", correct: false },
      { text: "12/5", correct: false }
    ]
  }
];

let current = 0;
let score = 0;

const startScreen = document.getElementById("startScreen");
const quizScreen = document.getElementById("quizScreen");
const questionEl = document.getElementById("question");
const answersEl = document.getElementById("answers");
const progressBar = document.getElementById("progressBar");
const scoreEl = document.getElementById("score");

function startQuiz() {
  startScreen.classList.add("hidden");
  quizScreen.classList.remove("hidden");
  showQuestion();
}

function showQuestion() {
  let q = questions[current];
  questionEl.textContent = q.text;
  answersEl.innerHTML = "";

  q.answers.forEach(a => {
    let btn = document.createElement("button");
    btn.textContent = a.text;
    btn.className = "btn";
    btn.onclick = () => selectAnswer(btn, a.correct);
    answersEl.appendChild(btn);
  });

  progressBar.style.width = ((current / questions.length) * 100) + "%";
}

function selectAnswer(button, correct) {
  const buttons = answersEl.querySelectorAll(".btn");

  buttons.forEach(btn => btn.disabled = true);

  if (correct) {
    button.classList.add("correct");
    score++;
  } else {
    button.classList.add("wrong");
  }

  // highlight correct answer
  buttons.forEach((btn, index) => {
    if (questions[current].answers[index].correct) {
      btn.classList.add("correct");
    }
  });

  scoreEl.textContent = "Điểm: " + score;

  setTimeout(() => {
    current++;
    if (current < questions.length) {
      showQuestion();
    } else {
      showResult();
    }
  }, 800);
}

function showResult() {
  progressBar.style.width = "100%";

  questionEl.textContent = "Kết thúc";
  answersEl.innerHTML = `
    <h3>Tổng điểm: ${score} / ${questions.length}</h3>
    <button class="btn" onclick="restart()">Bắt đầu lại</button>
  `;
}

function restart() {
  current = 0;
  score = 0;
  scoreEl.textContent = "Điểm: 0";
  showQuestion();
}

// NOTE: we do NOT auto-start anymore
</script>

</body>
</html>
