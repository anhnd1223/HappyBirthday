<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quiz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #111;
      color: white;
    }

    .container {
      width: 90%;
      max-width: 400px;
      text-align: center;
    }

    h1, h2 {
      margin-bottom: 20px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border: none;
      border-radius: 10px;
      background: #333;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      background: #555;
    }

    .correct {
      background: #4caf50 !important;
    }

    .wrong {
      background: #e53935 !important;
    }

    .hidden {
      display: none;
    }

    .progress {
      height: 6px;
      background: #333;
      border-radius: 5px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: #4caf50;
      transition: width 0.3s;
    }

    .score {
      margin-bottom: 10px;
      font-size: 14px;
      color: #ccc;
    }

    p {
      color: #ccc;
      line-height: 1.5;
    }
  </style>
</head>
<body>

<div class="container">
<audio id="bgm" autoplay loop>
  <source src = "assets/birthday-music.mp3" type="audio/mpeg">
</audio>
  <!-- START SCREEN -->
  <div id="startScreen">
    <h1>Quick Quiz</h1>
    <p>
      Test your knowledge with a few simple questions.<br><br>
      Try to get the highest score possible!
    </p>
    <button class="btn" onclick="startQuiz()">Start</button>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="quizScreen" class="hidden">
    <div class="score" id="score">Điểm: 0</div>

    <div class="progress">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <h2 id="question">Question</h2>
    <div id="answers"></div>
  </div>

</div>

<script>
const questions = [
  {
    text: "Bánh mì Việt Nam thường có đặc điểm nào sau đây?",
    answers: [
      { text: "Chỉ có phô mai", correct: false },
      { text: "Kẹp nhiều loại nhân như thịt, rau, pate", correct: true },
      { text: "Là món tráng miệng ngọt", correct: false },
      { text: "Không có vỏ giòn", correct: false },
    ]
  },
  {
    text: "Nguyên liệu nào là đặc trưng trong ẩm thực Việt Nam?",
    answers: [
      { text: "Bơ và sữa", correct: false },
      { text: "Nước mắm", correct: true },
      { text: "Phô mai", correct: false },
      { text: "Bơ đậu phộng", correct: false },
    ]
  },
  {
    text: "Món ăn nào thường xuất hiện trong mâm cỗ ngày Tết ở miền Bắc?",
    answers: [
      { text: "Pizza", correct: false },
      { text: "Sushi", correct: false },
      { text: "Bánh chưng", correct: true },
      { text: "Hamburger", correct: false }
    ]
  },
  {
    text: "Nước mắm có những tác dụng nào trong ẩm thực Việt Nam?",
    answers: [
      { text: "Chỉ dùng để tạo màu cho món ăn", correct: false },
      { text: "Làm tăng hương vị, dùng làm nước chấm và gia vị nấu ăn", correct: true },
      { text: "Chỉ dùng để ướp đồ ngọt", correct: false },
      { text: "Không có vai trò quan trọng", correct: false }
    ]
  }
];

let current = 0;
let score = 0;

const startScreen = document.getElementById("startScreen");
const quizScreen = document.getElementById("quizScreen");
const questionEl = document.getElementById("question");
const answersEl = document.getElementById("answers");
const progressBar = document.getElementById("progressBar");
const scoreEl = document.getElementById("score");

function startQuiz() {
  startScreen.classList.add("hidden");
  quizScreen.classList.remove("hidden");
  showQuestion();
}

function showQuestion() {
  let q = questions[current];
  questionEl.textContent = q.text;
  answersEl.innerHTML = "";

  q.answers.forEach(a => {
    let btn = document.createElement("button");
    btn.textContent = a.text;
    btn.className = "btn";
    btn.onclick = () => selectAnswer(btn, a.correct);
    answersEl.appendChild(btn);
  });

  progressBar.style.width = ((current / questions.length) * 100) + "%";
}

function selectAnswer(button, correct) {
  const buttons = answersEl.querySelectorAll(".btn");

  buttons.forEach(btn => btn.disabled = true);

  if (correct) {
    button.classList.add("correct");
    score++;
  } else {
    button.classList.add("wrong");
  }

  // highlight correct answer
  buttons.forEach((btn, index) => {
    if (questions[current].answers[index].correct) {
      btn.classList.add("correct");
    }
  });

  scoreEl.textContent = "Điểm: " + score;

  setTimeout(() => {
    current++;
    if (current < questions.length) {
      showQuestion();
    } else {
      showResult();
    }
  }, 800);
}

function showResult() {
  progressBar.style.width = "100%";

  questionEl.textContent = "Quiz Finished!";
  answersEl.innerHTML = `
    <h3>Your Score: ${score} / ${questions.length}</h3>
    <button class="btn" onclick="restart()">Restart</button>
  `;
}

function restart() {
  current = 0;
  score = 0;
  scoreEl.textContent = "Score: 0";
  showQuestion();
}

// NOTE: we do NOT auto-start anymore
</script>

</body>
</html>
